<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>응급의료·병원·약국 찾기 | 공공의료 정보</title>
  <meta name="description" content="국립중앙의료원 공공데이터 기반 응급실 실시간 가용병상, 내 주변 응급실·약국, 외상센터, 달빛어린이병원, 병·의원, 약국 찾기" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="wrap">
      <h1>🏥 공공의료 정보 찾기</h1>
      <p class="sub">국립중앙의료원 공공데이터 · 실시간 가용병상 · 내 주변 · 외상센터 · 달빛어린이병원</p>
    </div>
  </header>

  <nav class="tabs wrap" role="tablist">
    <button class="tab active" data-tab="emergency" role="tab">🚑 응급실</button>
    <button class="tab" data-tab="hospital" role="tab">🏥 병·의원</button>
    <button class="tab" data-tab="pharmacy" role="tab">💊 약국</button>
    <button class="tab" data-tab="seoul" role="tab">🎫 서울 예약</button>
  </nav>

  <main class="wrap">
    <div id="modes" class="modes" role="tablist"></div>

    <section class="controls">
      <div class="field region-only">
        <label for="sido">시/도</label>
        <select id="sido"></select>
      </div>
      <div class="field region-only">
        <label for="sigungu">시/군/구</label>
        <select id="sigungu"></select>
      </div>
      <div class="field region-only" id="keyword-field">
        <label for="keyword">기관명 <span class="opt">(선택)</span></label>
        <input type="text" id="keyword" placeholder="예: 삼성서울병원" />
      </div>
      <div class="field severe-only" style="display:none">
        <label for="severeType">중증질환 <span class="opt">(선택)</span></label>
        <select id="severeType"></select>
      </div>
      <button id="searchBtn" class="search-btn region-only">조회</button>
      <button id="geoBtn" class="search-btn geo-only" style="display:none">📍 내 위치로 검색</button>

      <!-- 서울 공공서비스예약 전용 컨트롤 -->
      <div class="field seoul-only" style="display:none">
        <label for="seoulArea">자치구</label>
        <select id="seoulArea"></select>
      </div>
      <div class="field seoul-only" style="display:none">
        <label for="seoulStat">접수상태</label>
        <select id="seoulStat">
          <option value="">전체</option>
          <option value="접수중">접수중만</option>
        </select>
      </div>
      <div class="field seoul-only" style="display:none">
        <label for="seoulKw">서비스명 <span class="opt">(선택)</span></label>
        <input type="text" id="seoulKw" placeholder="예: 테니스장" />
      </div>
      <button id="seoulBtn" class="search-btn seoul-only" style="display:none">조회</button>
    </section>

    <p id="hint" class="hint"></p>
    <div id="status" class="status"></div>
    <div id="results" class="results"></div>
  </main>

  <footer class="app-footer wrap">
    <p>출처: 국립중앙의료원 — 공공데이터포털(data.go.kr) OpenAPI</p>
    <p class="disclaimer">실시간 정보는 의료기관 입력 시점 기준이며 실제와 다를 수 있습니다. 응급상황 시 <strong>119</strong>에 신고하세요.</p>
  </footer>

  <!-- 서울 예약 상세 모달 -->
  <div id="modal" class="modal" style="display:none">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-box" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="닫기">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="/js/regions.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
