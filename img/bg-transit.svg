<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <!-- 생활·교통 모티프: 은은한 지하철 노선 + 역. 매우 낮은 불투명도로 워터마크처럼 -->
  <g fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.06">
    <!-- 파란 노선 -->
    <path d="M-10 60 L70 60 Q100 60 100 90 L100 150 Q100 180 130 180 L270 180" stroke="#3b6ef5"/>
    <!-- 초록 노선 -->
    <path d="M40 -10 L40 90 Q40 120 70 120 L200 120 Q230 120 230 150 L230 270" stroke="#0f9d58"/>
    <!-- 주황 노선 -->
    <path d="M-10 210 L80 210 Q110 210 110 240 L110 270" stroke="#f2913d"/>
  </g>
  <!-- 환승역/역 표시 -->
  <g fill="#5c6675" opacity="0.10">
    <circle cx="40" cy="60" r="5"/>
    <circle cx="100" cy="120" r="6"/>
    <circle cx="230" cy="180" r="5"/>
    <circle cx="110" cy="210" r="5"/>
    <circle cx="70" cy="120" r="4"/>
  </g>
</svg>
